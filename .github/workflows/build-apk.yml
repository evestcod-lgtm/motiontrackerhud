name: Build APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        continue-on-error: true

      - name: Decode release keystore (if configured)
        id: keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        if: env.RELEASE_KEYSTORE_BASE64 != ''
        run: |
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > release.keystore
          echo "has_keystore=true" >> "$GITHUB_OUTPUT"

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      - name: Build release APK (unsigned or signed)
        env:
          RELEASE_KEYSTORE_PATH: ${{ steps.keystore.outputs.has_keystore == 'true' && format('{0}/release.keystore', github.workspace) || '' }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: gradle assembleRelease --no-daemon

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: motiontrackerhud-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: motiontrackerhud-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
